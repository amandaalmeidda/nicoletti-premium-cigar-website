<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicoletti Premium Cigars</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-snap-type: y proximity; }
  html, body { margin: 0; padding: 0; background: var(--color-near-black); }
  ::selection { background: var(--gold-20); }
  img { display: block; }

  /* Gentle scroll-snap — each full section settles into view; proximity keeps
     taller sections (Journal) fully scrollable. */
  section { scroll-snap-align: start; scroll-snap-stop: normal; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Reveal entrance — visible by default, animates FROM hidden (print/PDF/headless safe) */
  @keyframes revealUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
  .reveal-up { animation: revealUp 720ms cubic-bezier(0.4,0,0.2,1) both; }

  /* Hero content entrance — fade + slight rise, re-keyed per slide */
  @keyframes heroIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .hero-content-in { animation: heroIn 900ms cubic-bezier(0.4,0,0.2,1) both; }

  /* Menu item hover — colour → gold, subtle right nudge */
  .menu-item-row:hover { color: var(--color-gold) !important; transform: translateX(8px) !important; }
  .menu-close:hover { opacity: 1; transform: rotate(90deg); transition: transform 200ms ease; }

  .footer-link { transition: opacity 200ms ease, color 200ms ease; }
  .footer-link:hover { opacity: 1 !important; color: var(--color-gold) !important; }
  .social-link { transition: opacity 200ms ease; }
  .social-link:hover { opacity: 0.9 !important; }

  /* Collection rail */
  .rail-scroller { scrollbar-width: none; -ms-overflow-style: none; }
  .rail-scroller::-webkit-scrollbar { display: none; }
  .rail-scroller:active { cursor: grabbing; }
  .rail-arrow {
    width: 52px; height: 52px; border: 1px solid rgba(201,164,107,.4); background: transparent;
    color: var(--color-off-white); font-size: 18px; cursor: pointer; border-radius: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 250ms ease, border-color 250ms ease, color 250ms ease;
  }
  .rail-arrow:hover { border-color: var(--color-gold); color: var(--color-gold); background: rgba(201,164,107,.06); }

  /* Responsive — collapse splits, tighten margins */
  @media (max-width: 860px) {
    .franco-photo, .club-photo { min-height: 300px !important; }
    section[data-screen-label="Franco"], section[data-screen-label="The Club"] { grid-template-columns: 1fr !important; }
    section[data-screen-label="Franco"] .franco-photo { order: -1; }
    header { padding: 20px 24px !important; }
    .orient-grid { grid-template-columns: 1fr !important; gap: 36px !important; }
  }

  .lang-opt:hover { opacity: 1 !important; }

  @media (prefers-reduced-motion: reduce) {
    .hero-content-in { animation: none !important; }
    .reveal-up { animation: none !important; }
    *[style*="animation"] { animation: none !important; }
    html { scroll-behavior: auto; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/i18n.jsx"></script>
<script type="text/babel" src="components/primitives.jsx"></script>
<script type="text/babel" src="components/Header.jsx"></script>
<script type="text/babel" src="components/VinylWidget.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/Orientation.jsx"></script>
<script type="text/babel" src="components/ExploreGrid.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>

<script type="text/babel">
  const { useState } = React;

  function App() {
    const [menuOpen, setMenuOpen] = useState(false);
    const [heroImg, setHeroImg] = useState(HERO_SLIDES[0].img);

    return (
      <div>
        <Header onOpenMenu={() => setMenuOpen(true)} />

        <HeroCarousel onCurrentImg={setHeroImg} />
        <VinylWidget />

        {/* Plain-language orientation — what it is / how you take part (newcomer-first) */}
        <Orientation />

        {/* Inspire first — then hand off to a single content grid (RR pattern) */}
        <ExploreGrid />

        <Footer />

        <MenuOverlay open={menuOpen} onClose={() => setMenuOpen(false)} bg={heroImg} />
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  const renderApp = () => root.render(<App />);
  window.__langSubs.add(renderApp);
  renderApp();
</script>
</body>
</html>
