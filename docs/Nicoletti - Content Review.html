<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicoletti — Content Review</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--color-warm-white); color: var(--color-espresso); }
  img { display: block; }

  /* ---- Review chrome ---- */
  .review-top {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px clamp(20px, 4vw, 56px);
    background: rgba(250,248,245,.86); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(31,23,24,.1);
  }
  .review-top .mark { font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; color: var(--color-espresso); }
  .lang-switch { display: flex; align-items: center; gap: 6px; }
  .lang-switch button {
    background: transparent; border: none; cursor: pointer; padding: 4px 6px;
    font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--color-espresso); opacity: 0.4; transition: opacity 200ms ease;
  }
  .lang-switch button.on { opacity: 1; }
  .lang-switch .bar { width: 1px; height: 14px; background: rgba(31,23,24,.3); }

  .intro { max-width: 760px; margin: 0 auto; padding: clamp(64px,8vw,110px) 24px clamp(40px,5vw,64px); text-align: center; }
  .intro h1 { font-family: var(--font-display); font-weight: 300; font-style: normal; text-transform: uppercase; letter-spacing: 0.05em; font-size: clamp(34px,4.6vw,58px); color: var(--color-espresso); margin: 0; text-shadow: none; line-height: 1.1; }
  .intro .lede { font-family: var(--font-body); font-size: 16.5px; line-height: 1.85; color: rgba(31,23,24,.78); margin: 28px auto 0; max-width: 640px; }
  .intro .hair { width: 46px; height: 1px; background: var(--color-gold); margin: 36px auto 0; }

  .legend { display: inline-flex; align-items: center; gap: 10px; margin: 30px auto 0; font-family: var(--font-body); font-size: 12px; letter-spacing: 0.04em; color: rgba(31,23,24,.62); }
  .legend .swatch { display: inline-block; padding: 1px 8px; }

  /* ---- Proposal frame ---- */
  .frame { max-width: 1160px; margin: 0 auto; padding: clamp(40px,5vw,64px) clamp(20px,3vw,32px) clamp(20px,3vw,28px); }
  .frame-head { max-width: 820px; margin: 0 auto clamp(28px,3vw,40px); padding: 0 4px; }
  .frame-kicker { display: flex; align-items: center; gap: 12px; }
  .frame-kicker .num { font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.18em; color: var(--color-gold); }
  .frame-kicker .tag { font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; padding: 3px 8px; color: var(--color-espresso); border: 1px solid rgba(31,23,24,.28); }
  .frame-kicker .tag.new { color: #5a7d3a; border-color: rgba(90,125,58,.5); }
  .frame-loc { font-family: var(--font-display); font-style: italic; font-weight: 300; font-size: clamp(21px,2.4vw,30px); color: var(--color-espresso); margin: 16px 0 0; line-height: 1.3; }
  .frame-note { font-family: var(--font-body); font-size: 15px; line-height: 1.7; color: rgba(31,23,24,.7); margin: 12px 0 0; max-width: 640px; }

  .pair { display: flex; flex-direction: column; gap: clamp(18px,2.4vw,30px); }
  .ba { position: relative; }
  .ba-tab { position: absolute; top: 16px; left: 16px; z-index: 3; font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; padding: 5px 11px; }
  .ba-tab.before { background: rgba(31,23,24,.08); color: rgba(31,23,24,.55); }
  .ba-tab.after  { background: var(--color-gold); color: #1c1208; }
  .ba.before .sec { filter: saturate(0.92); }

  /* ---- Rendered section surfaces (mirror experience.jsx) ---- */
  .sec { padding: clamp(64px,8vw,104px) 24px; }
  .sec.light  { background: var(--color-warm-white); }
  .sec.sand   { background: #EBEAE7; }
  .sec.oxblood{ background: #2A1013; }
  .sec-inner { max-width: 760px; margin: 0 auto; text-align: center; display: flex; flex-direction: column; align-items: center; }
  .sec .lab { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--color-gold); }
  .sec h2 { font-family: var(--font-display); font-weight: 300; font-style: normal; text-transform: uppercase; letter-spacing: 0.04em; text-wrap: balance; line-height: 1.1; font-size: clamp(28px,3.6vw,48px); margin: 14px 0 0; text-shadow: none; }
  .sec.light h2, .sec.sand h2 { color: var(--color-espresso); }
  .sec.oxblood h2 { color: var(--color-off-white); }
  .sec .div { width: 46px; height: 1px; margin: 28px 0; }
  .sec.light .div, .sec.sand .div { background: rgba(31,23,24,.22); }
  .sec.oxblood .div { background: rgba(201,164,107,.5); }
  .sec .body { display: flex; flex-direction: column; gap: 20px; max-width: 600px; }
  .sec .body p { margin: 0; font-size: 16.5px; line-height: 1.85; }
  .sec.light .body p, .sec.sand .body p { color: rgba(31,23,24,.82); }
  .sec.oxblood .body p { color: rgba(245,240,232,.84); }
  .sec .sub { font-family: var(--font-display); font-style: italic; font-weight: 300; color: var(--color-tobacco); font-size: clamp(19px,1.9vw,24px); line-height: 1.5; margin: 22px 0 0; }
  .sec .cta { margin-top: 38px; }
  .sec .cta .btn-ghost { pointer-events: none; }

  /* anchor highlight — the newly added concrete sentence */
  .anchor {
    background: rgba(201,164,107,.18);
    border-bottom: 1px solid rgba(201,164,107,.7);
    padding: 0.02em 0.12em;
    -webkit-box-decoration-break: clone; box-decoration-break: clone;
  }
  .sec.oxblood .anchor { background: rgba(201,164,107,.2); }

  /* ---- Orientation moment pillars ---- */
  .orient { background: var(--color-warm-white); padding: clamp(72px,9vw,120px) clamp(24px,5vw,72px); }
  .orient-head { max-width: 720px; margin: 0 auto clamp(48px,5vw,72px); text-align: center; }
  .orient-head h2 { font-family: var(--font-display); font-weight: 300; text-transform: uppercase; letter-spacing: 0.04em; font-size: clamp(30px,4vw,52px); color: var(--color-espresso); margin: 14px 0 0; text-shadow: none; }
  .orient-head .sub { font-family: var(--font-display); font-style: italic; font-weight: 300; color: var(--color-tobacco); font-size: clamp(18px,1.9vw,23px); margin: 20px 0 0; }
  .pillars { max-width: 1140px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(28px,4vw,64px); }
  .pillar { display: flex; flex-direction: column; gap: 14px; padding-top: 22px; border-top: 1px solid rgba(201,164,107,.55); }
  .pillar .pnum { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.18em; color: var(--color-gold); }
  .pillar h3 { font-family: var(--font-display); font-weight: 500; font-size: clamp(22px,2.2vw,28px); color: var(--color-espresso); margin: 0; letter-spacing: 0.01em; }
  .pillar p { font-family: var(--font-body); font-size: 15.5px; line-height: 1.7; color: rgba(31,23,24,.8); margin: 0; }
  .orient-cta { text-align: center; margin-top: clamp(48px,5vw,72px); }
  .orient-cta .btn-ghost { pointer-events: none; }

  .flow-hint { max-width: 820px; margin: 14px auto 0; display: flex; align-items: center; justify-content: center; gap: 12px; font-family: var(--font-body); font-size: 12px; letter-spacing: 0.06em; color: rgba(31,23,24,.5); }
  .flow-hint .chip { padding: 4px 10px; border: 1px solid rgba(31,23,24,.2); }
  .flow-hint .chip.cur { border-color: var(--color-gold); color: var(--color-tobacco); }

  .closer { max-width: 700px; margin: 0 auto; padding: clamp(56px,7vw,96px) 24px clamp(72px,9vw,120px); text-align: center; }
  .closer p { font-family: var(--font-body); font-size: 16px; line-height: 1.85; color: rgba(31,23,24,.78); margin: 0; }
  .closer .hair { width: 46px; height: 1px; background: var(--color-gold); margin: 0 auto 36px; }

  @media (max-width: 760px) {
    .pillars { grid-template-columns: 1fr; }
  }
</style>
</head>

<div id="proposals"></div>

</div>

        after: [
          [{t:"O acendimento n\u00E3o \u00E9 uma formalidade \u2014 \u00E9 onde a aten\u00E7\u00E3o come\u00E7a. "},{t:"Toste o p\u00E9 do charuto alguns segundos acima da chama, nunca nela; depois trague suavemente e gire at\u00E9 a brasa acender por igual em toda a borda.", a:true}],
          [{t:"F\u00F3sforo de cedro, chama paciente, rota\u00E7\u00E3o lenta. A noite come\u00E7a quando voc\u00EA decide que ela n\u00E3o tem pressa."}],
        ],
      },
    ],
  },
};

let LANG = "en";

function ghost(label) {
  return '<span class="btn-ghost"><span>' + label + '</span><span class="arrow">\u2192</span></span>';
}
function renderParas(paras) {
  return paras.map(function(p){
    var html = p.map(function(seg){ return seg.a ? '<span class="anchor">' + seg.t + '</span>' : seg.t; }).join("");
    return '<p>' + html + '</p>';
  }).join("");
}
function renderSection(d, paras) {
  var s = '<div class="sec ' + d.surface + '"><div class="sec-inner">';
  if (d.label) s += '<div class="lab">' + d.label + '</div>';
  s += '<h2>' + d.title + '</h2>';
  if (d.divider) s += '<div class="div"></div>'; else s += '<div style="height:28px"></div>';
  s += '<div class="body">' + renderParas(paras) + '</div>';
  if (d.cta) s += '<div class="cta">' + ghost(d.cta) + '</div>';
  s += '</div></div>';
  return s;
}

function renderOrientation(t) {
  var pillars = t.pillars.map(function(p){
    return '<div class="pillar"><span class="pnum">' + p.n + '</span><h3>' + p.h + '</h3><p>' + p.p + '</p></div>';
  }).join("");
  var sec = '<div class="orient">' +
    '<div class="orient-head"><div class="lab" style="font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--color-gold)">' + t.o_label + '</div>' +
    '<h2>' + t.o_title + '</h2><div class="sub">' + t.o_sub + '</div></div>' +
    '<div class="pillars">' + pillars + '</div>' +
    '<div class="orient-cta">' + ghost(t.o_cta) + '</div></div>';

  return '<div class="frame"><div class="frame-head">' +
    '<div class="frame-kicker"><span class="num">01</span><span class="tag new">' + t.o_tag + '</span></div>' +
    '<div class="frame-loc">' + t.o_loc + '</div><p class="frame-note">' + t.o_note + '</p>' +
    '<div class="flow-hint"><span class="chip">' + t.o_flowA + '</span><span>\u2192</span><span class="chip cur">' + t.o_flowB + '</span><span>\u2192</span><span class="chip">' + t.o_flowC + '</span></div>' +
    '</div>' +
    '<div class="pair"><div class="ba">' + sec + '</div></div></div>';
}

function renderProposal(p, idx, beforeLabel, afterLabel) {
  return '<div class="frame"><div class="frame-head">' +
    '<div class="frame-kicker"><span class="num">' + String(idx).padStart(2,"0") + '</span><span class="tag">' + p.tag + '</span></div>' +
    '<div class="frame-loc">' + p.loc + '</div><p class="frame-note">' + p.note + '</p></div>' +
    '<div class="pair">' +
      '<div class="ba before"><span class="ba-tab before">' + beforeLabel + '</span>' + renderSection(p, p.before) + '</div>' +
      '<div class="ba after"><span class="ba-tab after">' + afterLabel + '</span>' + renderSection(p, p.after) + '</div>' +
    '</div></div>';
}

function render() {
  var t = DATA[LANG];
  document.querySelectorAll("[data-i]").forEach(function(el){ el.textContent = t[el.getAttribute("data-i")]; });
  var beforeLabel = LANG === "pt" ? "Antes" : "Before";
  var afterLabel  = LANG === "pt" ? "Depois" : "After";
  var html = renderOrientation(t);
  t.props.forEach(function(p, i){ html += renderProposal(p, i + 2, beforeLabel, afterLabel); });
  document.getElementById("proposals").innerHTML = html;
  document.documentElement.lang = LANG === "pt" ? "pt-BR" : "en";
}

document.getElementById("langSwitch").addEventListener("click", function(e){
  var b = e.target.closest("button"); if (!b) return;
  LANG = b.getAttribute("data-l");
  document.querySelectorAll("#langSwitch button").forEach(function(x){ x.classList.toggle("on", x === b); });
  render();
});

render();
</script>
</body>
</html>
